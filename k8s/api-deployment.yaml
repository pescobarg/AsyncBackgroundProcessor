apiVersion: apps/v1
kind: Deployment
metadata:
  name: asyncbackgroundprocessor-api
  namespace: asyncbackgroundprocessor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asyncbackgroundprocessor-api
  template:
    metadata:
      labels:
        app: asyncbackgroundprocessor-api
    spec:
      containers:
        - name: api
          image: asyncbackgroundprocessor-api
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url
          ports:
            - containerPort: 8000