apiVersion: apps/v1
kind: Deployment
metadata:
  name: asyncbackgroundprocessor-worker
  namespace: asyncbackgroundprocessor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asyncbackgroundprocessor-worker
  template:
    metadata:
      labels:
        app: asyncbackgroundprocessor-worker
    spec:
      containers:
        - name: worker
          image: asyncbackgroundprocessor-worker
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url